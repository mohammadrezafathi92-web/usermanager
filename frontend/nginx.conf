server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Remote bot deploy (SSH install on a second server, incl. `curl
        # get.docker.com` + full `docker compose up --build` of the whole
        # backend image, not a slim one - see remote_deploy.py's docstring)
        # can legitimately take several minutes on a modest VPS. This must
        # stay ABOVE remote_deploy.py's own internal 600s per-step timeout
        # (so a genuine backend-side timeout there gets to return its own
        # proper error response first) and the frontend's axios timeout for
        # this call (client.js's deployRemoteBot) - otherwise nginx cuts the
        # connection with a bare 504 and the panel has nothing useful to
        # show but a generic "خطا در نصب ربات روی سرور دوم".
        proxy_read_timeout 660s;
        proxy_connect_timeout 660s;
        # nginx's default client_max_body_size is 1m, which silently rejects
        # (413, plain HTML body - no JSON "detail") any database-restore
        # upload larger than that once real usage_logs/connections data has
        # accumulated. The frontend then has nothing to show but its generic
        # "خطا در بازگردانی دیتابیس" fallback, hiding the real cause.
        client_max_body_size 200m;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
