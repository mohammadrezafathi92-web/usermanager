server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Remote bot deploy (SSH install on a second server, incl. `apt-get
        # install docker` + `docker compose up --build`) can legitimately
        # take a few minutes - the nginx default of 60s would cut it off
        # with a 504 partway through.
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        # nginx's default client_max_body_size is 1m, which silently rejects
        # (413, plain HTML body - no JSON "detail") any database-restore
        # upload larger than that once real usage_logs/connections data has
        # accumulated. The frontend then has nothing to show but its generic
        # "خطا در بازگردانی دیتابیس" fallback, hiding the real cause.
        client_max_body_size 200m;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
